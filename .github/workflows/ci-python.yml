name: Python CI (LLM Engineering)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync
    - name: Lint with flake8
      run: |
        # Install flake8 in the uv environment
        uv pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        uv run flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uv run flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
    - name: Check notebook syntax (basic)
      run: |
        # Basic check: ensure notebooks can be parsed (notebooks/ and src/)
        uv run python << 'PYTHON_SCRIPT'
        import json
        import glob
        for pattern in ['notebooks/**/*.ipynb', 'src/**/*.ipynb']:
            for notebook in glob.glob(pattern):
                with open(notebook, 'r', encoding='utf-8') as f:
                    json.load(f)
        PYTHON_SCRIPT
        || echo "No notebooks found or syntax error"
